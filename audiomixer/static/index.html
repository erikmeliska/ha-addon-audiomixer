<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio Mixer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(240 5.9% 90%)',
                        input: 'hsl(240 5.9% 90%)',
                        ring: 'hsl(142.1 76.2% 36.3%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(240 10% 3.9%)',
                        primary: { DEFAULT: 'hsl(142.1 76.2% 36.3%)', foreground: 'hsl(355.7 100% 97.3%)' },
                        secondary: { DEFAULT: 'hsl(240 4.8% 95.9%)', foreground: 'hsl(240 5.9% 10%)' },
                        destructive: { DEFAULT: 'hsl(0 84.2% 60.2%)', foreground: 'hsl(0 0% 98%)' },
                        muted: { DEFAULT: 'hsl(240 4.8% 95.9%)', foreground: 'hsl(240 3.8% 46.1%)' },
                        accent: { DEFAULT: 'hsl(240 4.8% 95.9%)', foreground: 'hsl(240 5.9% 10%)' },
                        card: { DEFAULT: 'hsl(0 0% 100%)', foreground: 'hsl(240 10% 3.9%)' },
                    },
                    borderRadius: { lg: '0.5rem', md: 'calc(0.5rem - 2px)', sm: 'calc(0.5rem - 4px)' },
                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes pulse-rec { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .rec-pulse { animation: pulse-rec 1s ease-in-out infinite; }
        @keyframes slide-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slide-in 0.3s ease-out; }
    </style>
</head>
<body class="bg-background text-foreground min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ── shadcn-style components ────────────────────────────────

        function Button({ children, variant = "default", size = "default", className = "", ...props }) {
            const variants = {
                default: "bg-primary text-primary-foreground hover:bg-primary/90",
                secondary: "bg-secondary text-secondary-foreground hover:bg-secondary/80",
                destructive: "bg-destructive text-foreground hover:bg-destructive/90",
                outline: "border border-border bg-transparent hover:bg-accent hover:text-accent-foreground",
                ghost: "hover:bg-accent hover:text-accent-foreground",
            };
            const sizes = {
                default: "h-10 px-4 py-2",
                sm: "h-9 px-3 text-sm",
                lg: "h-11 px-8",
                icon: "h-10 w-10",
            };
            return (
                <button
                    className={`inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 ${variants[variant]} ${sizes[size]} ${className}`}
                    {...props}
                >
                    {children}
                </button>
            );
        }

        function Card({ children, className = "" }) {
            return <div className={`rounded-lg border border-border bg-card text-card-foreground shadow-sm ${className}`}>{children}</div>;
        }

        function Badge({ children, variant = "default", className = "" }) {
            const variants = {
                default: "bg-primary text-primary-foreground",
                secondary: "bg-secondary text-secondary-foreground",
                destructive: "bg-destructive text-foreground",
                outline: "border border-border text-foreground",
            };
            return <span className={`inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold ${variants[variant]} ${className}`}>{children}</span>;
        }

        // ── Volume Meter ───────────────────────────────────────────

        function VolumeMeter({ mic, mode, onVolumeChange }) {
            const [showVolume, setShowVolume] = useState(false);
            const barWidth = 100;
            const level = Math.min(mic.level * barWidth, barWidth);
            const peak = Math.min(mic.peak * barWidth, barWidth);
            const db = mic.level > 0.001 ? (20 * Math.log10(mic.level / 10)).toFixed(0) : "-∞";
            const weightPct = Math.round((mic.weight || 0) * 100);
            const corrPct = Math.round((mic.correlation || 0) * 100);

            let barColor = "bg-emerald-500";
            if (mic.is_dead) barColor = "bg-red-900";
            else if (mic.is_muted || mic.below_gate) barColor = "bg-zinc-400";
            else if (mic.level > 0.85) barColor = "bg-red-500";
            else if (mic.level > 0.6) barColor = "bg-yellow-500";

            let statusBadge = null;
            if (mic.is_dead) statusBadge = <Badge variant="destructive">NO SIGNAL</Badge>;
            else if (mic.is_dominant) statusBadge = <Badge className="bg-cyan-600 text-white">ACTIVE</Badge>;
            else if (mic.is_muted) statusBadge = <Badge variant="secondary">muted</Badge>;
            else if (mic.below_gate) statusBadge = <Badge variant="outline">gate</Badge>;

            // Correlation badge for smart mode
            let corrBadge = null;
            if (mode === "smart" && !mic.is_dominant && !mic.below_gate && !mic.is_dead && corrPct > 0) {
                if (corrPct > 60) corrBadge = <Badge className="bg-orange-100 text-orange-700 text-[10px]">echo {corrPct}%</Badge>;
                else if (corrPct > 30) corrBadge = <Badge className="bg-yellow-100 text-yellow-700 text-[10px]">~{corrPct}%</Badge>;
                else corrBadge = <Badge className="bg-green-100 text-green-700 text-[10px]">indep</Badge>;
            }

            return (
                <Card className="p-4 animate-in">
                    <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center gap-2">
                            {mic.is_dominant && <span className="w-2 h-2 rounded-full bg-cyan-400 rec-pulse" />}
                            {mic.is_dead && <span className="w-2 h-2 rounded-full bg-red-500" />}
                            {!mic.is_dominant && !mic.is_dead && <span className="w-2 h-2 rounded-full bg-zinc-400" />}
                            <span className="font-medium text-sm cursor-pointer hover:underline" onClick={() => setShowVolume(!showVolume)}>{mic.name}</span>
                            <span className="text-xs text-muted-foreground">#{mic.index}</span>
                            {corrBadge}
                        </div>
                        <div className="flex items-center gap-2">
                            {statusBadge}
                            {mode !== "mix_all" && (
                                <span className={`text-xs font-mono w-10 text-right ${weightPct > 50 ? "text-emerald-600 font-semibold" : "text-muted-foreground"}`}>
                                    {weightPct}%
                                </span>
                            )}
                            <span className="text-xs text-muted-foreground font-mono w-16 text-right">{db} dB</span>
                        </div>
                    </div>
                    {/* Volume bar */}
                    <div className="relative h-2.5 bg-zinc-200 rounded-full overflow-hidden">
                        <div
                            className={`absolute inset-y-0 left-0 rounded-full transition-all duration-75 ${barColor}`}
                            style={{ width: `${level}%` }}
                        />
                        {peak > 1 && (
                            <div
                                className="absolute inset-y-0 w-0.5 bg-red-400"
                                style={{ left: `${peak}%` }}
                            />
                        )}
                    </div>
                    {/* Weight bar */}
                    {mode !== "mix_all" && (
                        <div className="relative h-1.5 bg-zinc-100 rounded-full overflow-hidden mt-1">
                            <div
                                className="absolute inset-y-0 left-0 rounded-full bg-cyan-400 transition-all duration-150"
                                style={{ width: `${weightPct}%` }}
                            />
                        </div>
                    )}
                    {/* Mic gain slider */}
                    {showVolume && mic.source_name && (
                        <div className="flex items-center gap-2 mt-2 pt-2 border-t border-zinc-100">
                            <span className="text-xs text-muted-foreground w-16">Mic gain:</span>
                            <input
                                type="range"
                                min="0"
                                max="150"
                                defaultValue="100"
                                className="flex-1 h-1.5 accent-emerald-500"
                                onChange={(e) => onVolumeChange(mic.source_name, parseInt(e.target.value))}
                            />
                            <span className="text-xs text-muted-foreground w-8">{mic.source_name ? "" : ""}</span>
                        </div>
                    )}
                </Card>
            );
        }

        // ── Recording Item ─────────────────────────────────────────

        function RecordingItem({ rec, onDelete }) {
            const date = new Date(rec.created * 1000);
            const dateStr = date.toLocaleDateString("sk-SK", { day: "2-digit", month: "2-digit", year: "numeric" });
            const timeStr = date.toLocaleTimeString("sk-SK", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
            const sizeKB = (rec.size / 1024).toFixed(0);

            return (
                <Card className="p-4 animate-in">
                    <div className="flex items-center justify-between mb-2">
                        <div>
                            <span className="font-medium text-sm">{rec.filename}</span>
                            <div className="flex gap-3 text-xs text-muted-foreground mt-1">
                                <span>{dateStr} {timeStr}</span>
                                <span>{rec.duration.toFixed(1)}s</span>
                                <span>{sizeKB} KB</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <a href={apiUrl(`/api/recordings/${rec.filename}`)} download>
                                <Button variant="outline" size="sm">Download</Button>
                            </a>
                            <Button variant="destructive" size="sm" onClick={() => onDelete(rec.filename)}>Delete</Button>
                        </div>
                    </div>
                    <audio
                        controls
                        preload="none"
                        src={apiUrl(`/api/recordings/${rec.filename}`)}
                        className="w-full h-8 mt-2"
                        style={{ opacity: 0.9 }}
                    />
                </Card>
            );
        }

        // ── Main App ───────────────────────────────────────────────

        // ── URL helpers (global, used by all components) ─────────
        function getBasePath() {
            const path = location.pathname;
            if (path.includes("ingress")) {
                return path.replace(/\/+$/, "");
            }
            return "";
        }

        function apiUrl(endpoint) {
            return getBasePath() + endpoint;
        }

        function wsUrl() {
            const proto = location.protocol === "https:" ? "wss:" : "ws:";
            return `${proto}//${location.host}${getBasePath()}/ws`;
        }

        function App() {
            const [status, setStatus] = useState(null);
            const [recordings, setRecordings] = useState([]);
            const [tab, setTab] = useState("live");
            const [connected, setConnected] = useState(false);
            const wsRef = useRef(null);

            const loadRecordings = useCallback(async () => {
                try {
                    const res = await fetch(apiUrl("/api/recordings"));
                    setRecordings(await res.json());
                } catch (e) {}
            }, []);

            const pollStatus = useCallback(async () => {
                try {
                    const res = await fetch(apiUrl("/api/status"));
                    const data = await res.json();
                    setStatus(data);
                    setConnected(true);
                } catch (e) {
                    setConnected(false);
                }
            }, []);

            const connectWs = useCallback(() => {
                const url = wsUrl();
                console.log("WS connecting to:", url);
                let ws;
                try {
                    ws = new WebSocket(url);
                } catch (e) {
                    console.log("WS failed, falling back to polling");
                    return false;
                }
                wsRef.current = ws;
                let wsWorked = false;

                ws.onopen = () => { setConnected(true); wsWorked = true; };
                ws.onclose = () => {
                    setConnected(false);
                    if (wsWorked) {
                        setTimeout(connectWs, 3000);
                    }
                    // If WS never worked, polling will take over
                };
                ws.onerror = () => {};
                ws.onmessage = (e) => {
                    try { setStatus(JSON.parse(e.data)); } catch {}
                };
                return true;
            }, []);

            useEffect(() => {
                connectWs();
                // Always poll as fallback (works through Ingress)
                const statusInterval = setInterval(pollStatus, 200);
                loadRecordings();
                const interval = setInterval(loadRecordings, 5000);

                return () => {
                    if (wsRef.current) wsRef.current.close();
                    clearInterval(interval);
                    clearInterval(statusInterval);
                };
            }, [loadRecordings, connectWs, pollStatus]);

            const send = async (action, data = {}) => {
                const payload = { action, ...data };
                if (wsRef.current?.readyState === WebSocket.OPEN) {
                    wsRef.current.send(JSON.stringify(payload));
                } else {
                    // Fallback: use REST API
                    const endpoints = {
                        record_start: ["/api/record/start", {}],
                        record_stop: ["/api/record/stop", {}],
                        set_mode: ["/api/mode", { mode: data.mode }],
                    };
                    const ep = endpoints[action];
                    if (ep) {
                        await fetch(apiUrl(ep[0]), {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(ep[1]),
                        });
                    }
                }
            };

            const setMode = (mode) => send("set_mode", { mode });

            const deleteRecording = async (filename) => {
                await fetch(apiUrl(`/api/recordings/${filename}`), { method: "DELETE" });
                loadRecordings();
            };

            const recDuration = status?.recording_duration || 0;
            const recTime = `${Math.floor(recDuration / 60)}:${String(Math.floor(recDuration % 60)).padStart(2, "0")}`;

            return (
                <div className="max-w-3xl mx-auto p-4 pb-24">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h1 className="text-2xl font-bold tracking-tight">Audio Mixer</h1>
                            <p className="text-sm text-muted-foreground">
                                {connected ? (
                                    <span className="flex items-center gap-1.5">
                                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500" />
                                        Connected
                                        {status?.is_live && ` · ${status.mics?.length || 0} mic(s)`}
                                    </span>
                                ) : (
                                    <span className="flex items-center gap-1.5">
                                        <span className="w-1.5 h-1.5 rounded-full bg-red-500" />
                                        Disconnected
                                    </span>
                                )}
                            </p>
                        </div>
                        {status?.is_recording && (
                            <div className="flex items-center gap-2">
                                <span className="w-3 h-3 rounded-full bg-red-500 rec-pulse" />
                                <span className="font-mono text-red-400 text-lg font-semibold">{recTime}</span>
                            </div>
                        )}
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-1 mb-6 p-1 bg-secondary rounded-lg">
                        <button
                            onClick={() => setTab("live")}
                            className={`flex-1 py-2 px-4 rounded-md text-sm font-medium transition-colors ${
                                tab === "live" ? "bg-background text-foreground shadow-sm" : "text-muted-foreground hover:text-foreground"
                            }`}
                        >
                            Live Monitor
                        </button>
                        <button
                            onClick={() => { setTab("recordings"); loadRecordings(); }}
                            className={`flex-1 py-2 px-4 rounded-md text-sm font-medium transition-colors ${
                                tab === "recordings" ? "bg-background text-foreground shadow-sm" : "text-muted-foreground hover:text-foreground"
                            }`}
                        >
                            Recordings {recordings.length > 0 && <Badge variant="secondary" className="ml-1.5">{recordings.length}</Badge>}
                        </button>
                    </div>

                    {/* Live tab */}
                    {tab === "live" && status && (
                        <div>
                            {/* Controls row */}
                            <div className="flex flex-wrap items-center gap-3 mb-6">
                                {/* Record button */}
                                {!status.is_recording ? (
                                    <Button onClick={() => send("record_start")} className="gap-2">
                                        <span className="w-2.5 h-2.5 rounded-full bg-red-500" />
                                        Record
                                    </Button>
                                ) : (
                                    <Button variant="destructive" onClick={() => send("record_stop")} className="gap-2">
                                        <span className="w-2.5 h-2.5 bg-white rounded-sm" />
                                        Stop & Save
                                    </Button>
                                )}

                                {/* Mode selector */}
                                <div className="flex gap-1 p-1 bg-secondary rounded-lg">
                                    {(status.available_modes || []).map((m) => (
                                        <button
                                            key={m.name}
                                            onClick={() => setMode(m.name)}
                                            className={`px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${
                                                status.mode === m.name
                                                    ? "bg-background text-foreground shadow-sm"
                                                    : "text-muted-foreground hover:text-foreground"
                                            }`}
                                        >
                                            {m.label}
                                        </button>
                                    ))}
                                </div>

                                {status.mics?.some(m => m.is_dead) && (
                                    <Badge variant="destructive">
                                        {status.mics.filter(m => m.is_dead).length} dead
                                    </Badge>
                                )}
                            </div>

                            {/* Meters */}
                            <div className="space-y-3">
                                {status.mics?.map((mic) => (
                                    <VolumeMeter
                                        key={mic.index}
                                        mic={mic}
                                        mode={status.mode}
                                        onVolumeChange={async (source, vol) => {
                                            await fetch(apiUrl("/api/mic/volume"), {
                                                method: "POST",
                                                headers: {"Content-Type": "application/json"},
                                                body: JSON.stringify({source_name: source, volume: vol}),
                                            });
                                        }}
                                    />
                                ))}
                            </div>

                            {!status.is_live && (
                                <Card className="p-8 text-center">
                                    <p className="text-muted-foreground">No microphones active</p>
                                </Card>
                            )}
                        </div>
                    )}

                    {/* Recordings tab */}
                    {tab === "recordings" && (
                        <div>
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-lg font-semibold">Recordings</h2>
                                <Button variant="outline" size="sm" onClick={loadRecordings}>
                                    Refresh
                                </Button>
                            </div>
                            <div className="space-y-3">
                                {recordings.length === 0 ? (
                                    <Card className="p-8 text-center">
                                        <p className="text-muted-foreground">No recordings yet</p>
                                    </Card>
                                ) : (
                                    recordings.map((rec) => (
                                        <RecordingItem
                                            key={rec.filename}
                                            rec={rec}
                                            onDelete={deleteRecording}
                                        />
                                    ))
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
