name: "Audio Mixer"
description: "Mix multiple USB microphones with live monitoring, dominant mic detection, and recording. Web UI with real-time volume meters."
version: "1.0.1"
slug: "audiomixer"
url: "https://github.com/erikmeliska/ha-addon-audiomixer"
arch:
  - aarch64
  - armv7
  - amd64
startup: "application"
boot: "manual"
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: "mdi:microphone-outline"
panel_title: "Audio Mixer"
audio: true
privileged:
  - SYS_ADMIN
devices:
  - /dev/snd
map:
  - share:rw
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Web UI"
options:
  auto_start: true
schema:
  auto_start: bool
